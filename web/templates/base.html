<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PI-CAI XAI Viewer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.27.1/plotly.min.js"></script>
  <style>
    :root {
      --nav-bg: #0f172a;
      --accent-umamba: #3b82f6;
      --accent-swin:   #10b981;
      --accent-nnunet: #ef4444;
    }
    body { background: #f1f5f9; min-height: 100vh; }

    /* Navbar */
    .navbar { background: var(--nav-bg) !important; box-shadow: 0 1px 8px rgba(0,0,0,.5); }
    .navbar-brand { font-weight: 700; letter-spacing: .03em; color: #e2e8f0 !important; }
    .nav-link { color: #94a3b8 !important; transition: color .15s; }
    .nav-link:hover, .nav-link.active { color: #f8fafc !important; }
    .nav-link.model-umamba_mtl:hover { color: var(--accent-umamba) !important; }
    .nav-link.model-swin_unetr:hover { color: var(--accent-swin) !important; }
    .nav-link.model-nnunet:hover     { color: var(--accent-nnunet) !important; }

    /* Model colour accents */
    .border-umamba_mtl { border-color: var(--accent-umamba) !important; }
    .border-swin_unetr { border-color: var(--accent-swin)   !important; }
    .border-nnunet     { border-color: var(--accent-nnunet)  !important; }
    .bg-umamba_mtl     { background: var(--accent-umamba) !important; }
    .bg-swin_unetr     { background: var(--accent-swin)   !important; }
    .bg-nnunet         { background: var(--accent-nnunet)  !important; }
    .text-umamba_mtl   { color: var(--accent-umamba) !important; }
    .text-swin_unetr   { color: var(--accent-swin)   !important; }
    .text-nnunet       { color: var(--accent-nnunet)  !important; }

    /* Classification badges */
    .badge-tp { background: #16a34a; }
    .badge-fp { background: #dc2626; }
    .badge-fn { background: #d97706; }
    .badge-tn { background: #6b7280; }

    /* Cards */
    .card { border: none; border-radius: .75rem; }
    .card-header { border-radius: .75rem .75rem 0 0 !important; font-weight: 600; }

    /* Zone badges */
    .badge-pz { background: #3a7bd5; }
    .badge-tz { background: #d93025; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">🔬 PI-CAI XAI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        {% for m in ['umamba_mtl', 'swin_unetr', 'nnunet'] %}
        <li class="nav-item">
          <a class="nav-link model-{{ m }}" href="/model/{{ m }}">{{ m }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
